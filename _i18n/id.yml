home:
  heading: Memicu <br class="brmob">revolusi privasi
  heading2: Firo adalah ekosistem dan mata uang kripto <br>yang menjaga privasi.
  cta1: Dapatkan Firo
  cta2: Pelajari lebih lanjut
  about: Cara kerja Firo
  aboutp: Firo unggul dengan memimpin inovasi dalam protokol dan privasi. Riset pelopor kami berfokus pada bagaimana privasi seharusnya bekerja dalam keuangan digital.
  privacy: Privasi
  privacy1: Firo mengembangkan Lelantus Spark yang menyediakan privasi on-chain tanpa kepercayaan (trustless) dengan tingkat anonimitas yang tinggi. Teknologi Dandelion++ menyediakan privasi pada lapisan jaringan.
  privacy2: set anonimitas
  privacy3: penyiapan tanpa kepercayaan (trustless setup)
  blockchain: Blockchain
  blockchain1: Sistem hibrida PoW dan LLMQ Chainlocks kami melindungi dari serangan 51% sekaligus memastikan finalitas blok dan transaksi yang nyaris instan, menjadikan Firo pilihan ideal untuk pembayaran yang aman dan efisien.
  blockchain2: total pasokan + emisi ekor (tail emission)
  blockchain3: proof of work
  blockchain4: master node
  privacyin: Infrastruktur Privasi
  privacyin1: Dengan Spark Assets, Firo memperluas privasi melampaui sekadar transaksi ke aset itu sendiri. Fitur ini menyembunyikan jenis aset yang ditransfer, menjadikannya sempurna untuk membuat token yang berfokus pada privasi untuk digunakan dalam aplikasi aman dan anonim seperti pemungutan suara atau aset tokenisasi pribadi.
  randd: Riset dan Pengembangan
  randd1: Firo menonjol sebagai satu dari sedikit proyek yang menyumbangkan riset independen untuk teknologi privasi blockchain dan desentralisasi seperti Zerocoin, Sigma, Lelantus, Lelantus Spark, dan MTP. Karya kami telah memainkan peran penting di bidang ini serta telah memengaruhi atau diadopsi oleh proyek-proyek lain.
  getfiro: Dapatkan Firo
  getfiro1: Beli, tambang, atau Dapatkan Firo, dan bergabunglah dalam revolusi privasi. <br>Simpan Firo Anda di salah satu dompet kami yang kaya fitur, dioptimalkan untuk daya, aksesibilitas, dan pengalaman pengguna.
  getfiro2: Dapatkan dompet
  getfiro2text: Firo memiliki berbagai pilihan untuk mengelola dana Anda di OS desktop dan seluler utama. Pilih yang paling sesuai untuk Anda. 
  getfiro2link: Unduh dompet
  getfiro3: Beli Firo
  getfiro3text: Firo memiliki berbagai pilihan untuk mengelola dana Anda di OS desktop dan seluler utama. Pilih yang paling sesuai untuk Anda.
  getfiro3link: Cari bursa (exchange)
  getfiro4: Dapatkan Firo
  getfiro4text: Anda dapat menyiapkan masternode Firo Anda sendiri untuk memperoleh Firo. Kami akan memandu Anda melalui proses penyiapan dalam panduan terperinci kami.
  getfiro4link: Siapkan masternode
  getfiro5: Mulai menambang
  getfiro5text: FiroPoW, algoritma penambangan Firo, dirancang untuk ditambang menggunakan GPU. Ikuti panduan kami untuk mulai menambang Firo pertama Anda.
  getfiro5link: Baca panduan menambang
  
