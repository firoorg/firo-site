tech:
  heading: Riset
  heading1: Privasi adalah tentang tetap selangkah di depan. Tim di balik Firo bertanggung jawab atas beberapa protokol privasi blockchain paling signifikan yang pernah ada, dan semua teknologi itu disatukan ke dalam Firo.
  academicpapers: Makalah Akademik
  audits: Audit
  sparklelantus1: Teknologi Lelantus Spark
  sparklelantus2: Lelantus Spark sangat meningkatkan pendahulunya, Lelantus, dengan alamat Spark fleksibel yang menyembunyikan semua jumlah transaksi, tidak dapat dicari di blockchain, namun tetap memungkinkan tanda tangan ambang batas (threshold signatures) yang efisien serta dukungan kunci tampilan (view key) baik masuk maupun keluar. Spark juga memiliki struktur modular yang memungkinkan komponen ditingkatkan seiring munculnya teknologi yang lebih baik sambil menyederhanakan analisis keamanan. Ini mempertahankan manfaat Lelantus tanpa penyiapan terpercaya (trusted setup), konstruksi yang mudah dipahami, dan didasarkan pada asumsi kriptografi yang mapan.
  lelantus1: Teknologi Lelantus
  lelantus2: Lelantus adalah protokol privasi generasi berikutnya yang dikembangkan oleh Aram Jivanyan di Firo. Lelantus memungkinkan Anda untuk membakar (burn) koin Anda, yang menyembunyikannya dalam set anonimitas lebih dari 65.000. Penerima dapat mencairkannya dari pool anonimitas ini, yang memutus tautan dari transaksi Anda dan semua transaksi sebelumnya yang telah dilaluinya.
  sigma1: Teknologi Sigma
  sigma2: Kami percaya bahwa tujuan utama blockchain adalah untuk membangun sistem yang tidak memerlukan kepercayaan, dan prinsip yang sama berlaku untuk sistem privasi kami. Inilah sebabnya kami membangun Sigma untuk Zcoin pada tahun 2018 yang menghapus persyaratan penyiapan terpercaya (trusted setup) di Zerocoin. Sigma menggunakan kurva ECC 256-bit untuk ukuran bukti hanya 1,5 kB - peningkatan 17x lipat dari teknologi saat itu. Sigma merupakan pendahulu Lelantus, dan meletakkan banyak batu loncatan untuk membawa kita ke posisi saat ini.
  dandelion1: Teknologi Dandelion
  dandelion2: Dandelion++ melindungi alamat IP Anda. Sebelum transaksi Firo disiarkan ke seluruh jaringan, transaksi tersebut diacak di antara node dalam jumlah langkah yang acak. Dengan cara ini, asal siaran tidak berkorelasi dengan alamat IP Anda.
  mtp1: Keamanan yang terdesentralisasi dan adil
  mtp2: Algoritma penambangan Merkle Tree Proof (MTP) Firo dirancang untuk mendemokratisasi penambangan. Algoritma MTP bersifat intensif memori guna meningkatkan biaya pembuatan ASIC dan menjaga agar rantai tetap dapat ditambang oleh perangkat keras umum seperti GPU. Namun, node dapat melewati persyaratan memori ini dan memverifikasi bukti tersebut secara efisien. Audit yang disponsori Firo pada tahun 2017 membuktikan efektivitas pendekatan dua arah ini. MTP sejak itu telah digantikan oleh FiroPoW yang memiliki bukti lebih kecil dan strategi tahan-ASIC tambahan.
  
team:
  heading: Tim
  founders: pendiri
  coreteam: pengembang inti
  mobileteam: pengembangan seluler
  research: riset
  community: komunitas
  poramininsom:
    name: Poramin Insom
    title: Co-Founder
    bio: Poramin Insom mendirikan Zcoin (sekarang Firo) pada tahun 2016, berupaya menyediakan privasi finansial dan juga penambangan yang lebih inklusif melalui proof of work yang tahan ASIC. Ia meraih gelar master dalam Keamanan Informasi dari Universitas Johns Hopkins di mana ia menulis makalah tentang usulan implementasi praktis dari protokol Zerocoin. Ia meletakkan dasar-dasar teknologi Zcoin (sekarang Firo) mulai dari mengoding implementasi Zerocoin pertama di dunia dan juga mendorong riset serta pengembangan algoritma penambangan MTP. Poramin telah berfokus mendorong adopsi Firo ke dunia nyata, terutama keterlibatannya dalam memfasilitasi Partai Demokrat Thailand untuk melakukan pemilihan primer guna memilih pemimpin partainya di blockchain Firo pada tahun 2018, yang merupakan pemilihan politik skala besar pertama di dunia di atas blockchain. Ia juga pernah bertugas di militer Thailand di mana ia bertanggung jawab atas perang siber.
  reubenyap:
    name: Reuben Yap
    title: Co-Founder
    bio: Reuben Yap telah memimpin proyek ini dalam strategi keseluruhan, tujuan pengembangan, dan upaya riset selama beberapa tahun terakhir. Ia kini tetap menjadi bagian dari tim inti yang mengelola tim pengembangan dan riset. Bergabung dengan tim sesaat setelah awal berdirinya, ia telah memainkan peran penting dalam membentuk Firo hingga menjadi seperti sekarang. Reuben telah menjadi advokat vokal untuk privasi daring dan finansial setelah mendirikan salah satu layanan VPN pertama di Asia Tenggara untuk memerangi sensor di negaranya, dan merupakan pembicara yang dihormati dalam topik tersebut, dengan wawancara serta komentar unggulan di BBC, Nasdaq Tradetalks, Forbes, Coindesk, Reuters, dan Cheddar News, antara lain. Sebelum bergabung dengan Firo, Reuben adalah mitra di firma hukum dengan pengalaman praktik lebih dari sepuluh tahun yang berspesialisasi dalam pekerjaan penasihat di kerangka hukum dan institusional.
  petershugalev:
    name: Peter Shugalev
    title: Pengembang Utama
    bio: Peter adalah pemrogram dan arsitek perangkat lunak yang sangat terampil dengan pengalaman lebih dari 20 tahun. Ia tinggal di Moskow, Rusia, dan lulus dari Universitas Negeri Moskow dengan predikat magna cum laude dengan gelar Master dalam Ilmu Komputer dan Matematika. Ia telah menciptakan layanan terkait jaringan dan keamanan, bahkan menciptakan bahasa pemrogramannya sendiri serta kompiler lintas platform untuk sistem deteksi intrusi berbasis tanda tangan. Kombinasi langka antara pengetahuan kriptografi dan pemrograman telah membantu Firo tetap berada di garis depan privasi on-chain.
  levonpetrosyan:
    name: Levon Petrosyan
    title: Pengembang
    bio: Levon adalah insinyur perangkat lunak dengan gelar Master dalam Ilmu Komputasi dan Ekonomi dari American University of Armenia. Latar belakangnya adalah pemrograman C++ dan kriptografi. Ia adalah salah satu kontributor paling produktif di Firo yang telah mengoding sebagian besar pustaka kriptografi Lelantus Firo bersama dengan optimalisasi untuk mendukung set anonimitas yang besar.
  sproxet:
    name: Sproxet
    title: Pengembang
    bio: Sproxet adalah pengembang anonim yang telah mengerjakan perangkat lunak penjaga privasi selama 15 tahun terakhir dan telah berkontribusi secara signifikan pada klien Electron Firo. Sproxet juga merupakan pendiri Signal Eleven, sebuah konsultan IT yang berfokus pada keamanan dan audit komputer, pengembangan perangkat lunak, dan desain arsitektur sistem kriptografi.
  zorayrzakaryan:
    name: Zorayr Zakaryan
    title: Manajer Proyek Seluler
    bio: Zorayr adalah pengembang backend perangkat lunak dengan pengalaman lebih dari 14 tahun. Berspesialisasi dalam mengelola tim teknik dan menetapkan proses pengembangan yang tepat. Menyukai segala hal yang berkaitan dengan algoritma, mata uang kripto, dan video game.
  hakobkanoyan:
    name: Hakob Kanoyan
    title: Pengembang Seluler
    bio: Hakob memiliki pengalaman lebih dari 10 tahun sebagai pengembang seluler, backend, dan game. Ia memiliki latar belakang matematika yang kuat termasuk kriptografi. Hakob memimpin pengembangan teknis dompet seluler Firo.
  haykzakaryan:
    name: Hayk Zakaryan
    title: Pengembang Seluler
    bio: Dengan pengalaman lebih dari 11 tahun dalam rekayasa perangkat lunak, termasuk lebih dari 7 tahun pengembangan seluler asli dan lintas platform, Hayk bergabung dengan tim Firo sebagai insinyur seluler paruh waktu.
  arminezakaryan:
    name: Armine Zakaryan
    title: Desainer UI/UX
    bio: Seorang desainer UX / UI dengan pengalaman lebih dari 5 tahun. Ia adalah desainer otodidak yang penuh antusiasme dan motivasi untuk menciptakan pengalaman yang inovatif dan ramah pengguna serta antarmuka pengguna yang kreatif. Saat ini ia banyak mengerjakan desain produk B2B SAAS.
  anwarp:
    name: Anwar P.
    title: Dukungan Senior
    bio: Anwar mengambil jurusan teknik elektro dan elektronika, dengan pengalaman beberapa tahun dalam dukungan teknis di sebuah perusahaan IT. Ia menangani kueri dukungan, dokumentasi, dukungan pengembang, dan juga membantu Project Steward dalam urusan sehari-hari.
  ajaydono:
    name: Ajaydono
    title: Dukungan
    bio: Ajay membantu Project Steward dalam operasional sehari-hari serta pertanyaan dukungan. Ia memiliki Diploma Teknologi Informasi dengan jurusan Administrasi Database dan memiliki pengalaman beberapa tahun dalam dukungan teknis IT.
  lucasfullam:
    name: Lucas Fullam
    title: Manajer Komunitas
    bio: Lucas Fullam memiliki sejarah bekerja di pekerjaan yang berfokus pada pelanggan di masa lalu, mulai dari perwakilan layanan pelanggan hingga pengaturan acara di tempat pertemuan dan konferensi. Ia pertama kali mendengar tentang mata uang kripto pada tahun 2012, tetapi tidak benar-benar mendalaminya hingga tahun 2017 ketika salah satu temannya membawanya lebih dalam ke dunia kripto di mana ia akhirnya melihat betapa besarnya potensi yang ada. Satu hal berlanjut ke hal lain dan akhirnya ia menemukan Firo, dan sisanya adalah sejarah.
  sebastianbausch:
    name: Sebastian Bausch
    title: Operasional Asia
    bio: Sebastian Bausch adalah investor malaikat yang berbasis di Bangkok dan telah bersemangat tentang mata uang kripto sejak 2011. Ia belajar bahasa Mandarin di Universitas Xiamen dan memegang gelar pascasarjana dari Universitas Nottingham. Ia mendukung operasional tim di kawasan tersebut dan mengoordinasikan terjemahan serta pertemuan (meet-up).
  lemarlukebriones:
    name: Lemar "Luke" Briones
    title: Manajer Komunitas Filipina
    bio: Lulusan Teknologi Informasi dari Filipina, Lemar telah menjadi penggemar mata uang kripto sejak 2017 dan berdedikasi untuk menyebarkan kesadaran tentang Firo di seluruh Filipina.
  aramjivanyan:
    name: Aram Jivanyan
    title: Kepala Arsitek Privasi
    bio: Aram telah menjadi sosok kunci dalam mengembangkan teknologi inti Firo, setelah menciptakan protokol Lelantus dan Lelantus Spark. Inovasi ilmiah ini telah memengaruhi lanskap protokol privasi secara signifikan dalam ruang mata uang kripto, menginspirasi penciptaan protokol berfokus privasi lainnya seperti Triptych (Monero), Seraphis (Monero), dan Lelantus-MW (Beam). Ia juga telah merancang sistem pemungutan suara yang menjaga privasi dengan persyaratan kepercayaan minimal seperti Aura.
  aregvrtanesyan:
    name: Areg Vrtanesyan
    title: Peneliti Kriptografi / Pengembang
    bio: Areg adalah insinyur kriptografi di Firo dan saat ini sedang mengambil jurusan Keamanan Siber di YSU. Memiliki pengalaman dalam rekayasa perangkat lunak dan pemrograman back end dalam C++. Minatnya saat ini adalah kriptografi, keamanan informasi, dan musik.
  tigranmamikonyan:
    name: Tigran Mamikonyan
    title: Riset
    bio: Tigran memegang gelar Master dalam Informatika dan Matematika Terapan serta Ilmu Komputer dan Informasi. Saat ini ia sedang menempuh studi PhD dalam Informatika dan Matematika Terapan di Yerevan State University.
  artur:
    name: Artur
    title: Pengembang
    bio: Artur adalah insinyur perangkat lunak muda dan mahasiswa Universitas Kedokteran Negeri Yerevan, membawa perpaduan unik antara pengetahuan medis dan keterampilan teknologi. Lulus dari Picsart Academy, ia mahir dalam C/C++ dan memiliki pengalaman praktis dalam pengembangan perangkat lunak. Semangatnya terletak pada penggabungan kedokteran dan teknologi untuk menciptakan solusi yang berdampak.
  narek:
    name: Narek Geghamyan
    title: Pengembang
    bio: Narek adalah insinyur perangkat lunak yang lulus dari Fakultas Ilmu Komputer di Universitas Nasional Arsitektur dan Konstruksi Armenia. Stack teknologinya mencakup C++ dan Linux. Ia memiliki gairah dalam berenang dan koding.
  cypherstack:
    name: Cypher Stack
    title: Firma Desain
    bio: Cypher Stack adalah perusahaan pengembang blockchain, desain, riset, dan konsultasi. Saat ini mereka sedang mengembangkan Firo dengan dompet seluler dan dompet desktop ringan mereka, Campfire.
  batuhan:
    name: Batuhan
    title: Manajer Komunitas Turki
    bio: Batuhan mengelola komunitas Turki, menerjemahkan pengumuman dan pemberitahuan.
  antibit:
    name: Antibit
    title: Manajer Komunitas Berbahasa Rusia
    bio: Antibit mengelola komunitas berbahasa Rusia, menerjemahkan pengumuman dan pemberitahuan. Ia telah menjadi penggemar kripto sejak 2012, dan selama waktu tersebut telah mengakumulasi banyak pengetahuan serta pengalaman mengenai mata uang kripto dan teknologi blockchain.
  lilking:
    name: Lil-King
    title: Manajer Komunitas
    bio: Lil-King adalah advokat privasi yang berdedikasi di ruang kripto dengan pengalaman lebih dari lima tahun. Berspesialisasi dalam pemasaran dan onboarding, Lil-King telah memainkan peran krusial dalam mempromosikan proyek-proyek berfokus privasi. Bersemangat tentang privasi finansial, Lil-King berkomitmen untuk mengedukasi dan memberdayakan pengguna untuk mengendalikan aset digital mereka dengan aman.
  navidrahimi:
    name: Navid Rahimi
    title: Pengembang
    bio: Navid memiliki latar belakang yang kuat dalam infrastruktur kompiler dan optimalisasi sistem tingkat rendah. Ia memegang gelar MSc dalam Ilmu Komputer dari Simon Fraser University dan sebelumnya bekerja sebagai Insinyur Kompiler di Microsoft. Saat ini sebagai Pengembang Blockchain Inti di Firo, di mana ia mengerjakan fitur-fitur tingkat protokol termasuk Lelantus Spark, optimalisasi performa node, verifikasi konsensus, serta peningkatan pada lapisan P2P dan RPC untuk memperkuat stabilitas dan keamanan jaringan.
  
roadmap:
  heading: Peta Jalan
  intro1: Firo telah menempuh perjalanan panjang sejak awal berdirinya sebagai Zcoin, memelopori penggunaan zero-knowledge proofs modern dalam protokol privasi. Seiring waktu, kami terus mengiterasi teknologi kami, mengembangkan beberapa protokol privasi yang paling kuat di bidang ini — protokol yang telah memengaruhi banyak proyek lainnya.
  intro2: Peta jalan kami yang diperbarui berfokus pada kegunaan, utilitas, dan peningkatan.
  usability: Kegunaan
  usabilityp: Meningkatkan pengalaman pengguna, berintegrasi dengan dompet tambahan, dan mendukung klien ringan (light clients).
  utility: Utilitas
  utilityp: Memperluas kasus penggunaan melalui penerbitan token pribadi dan menerapkan peningkatan privasi lebih lanjut sebagai persiapan menghadapi tantangan komputasi kuantum di masa depan.
  upgrades: Peningkatan
  upgradesp: Terus memperkuat fitur inti protokol untuk mempertahankan posisi Firo sebagai pemimpin dalam teknologi privasi.
  neartermgoals: Tujuan jangka pendek
  sparknames: Spark Names
  sparknamesp: Memungkinkan pengguna untuk mendaftarkan alamat yang mudah dibaca manusia yang terikat dengan alamat Spark mereka. Ini juga memungkinkan penyimpanan dan berbagi metadata untuk potensi penggunaan sebagai identitas digital terdesentralisasi.
  sparkcoinbase: Spark Coinbase
  sparkcoinbasep: Memungkinkan penambang dan masternode untuk mengirim hadiah langsung ke alamat Spark pribadi, yang semakin meningkatkan privasi pengguna dan adopsi Spark.
  viewkeytooling: Alat View Key
  viewkeytoolingp: Mengembangkan metode yang ramah pengguna untuk berbagi dan menggunakan kunci tampilan (view keys) Spark, memungkinkan dompet khusus pantau (watch-only) dan pengungkapan dana berbasis Spark secara selektif untuk tujuan kepatuhan.
  midtermgoals: Tujuan jangka menengah
  sparkassets: Spark Assets
  sparkassetsp: Memungkinkan pengguna untuk menerbitkan aset penjaga privasi mereka sendiri. Aset-aset ini menikmati fitur privasi yang sama dengan Spark, termasuk kemampuan untuk menyembunyikan jenis aset. Semua aset (termasuk Firo) berkontribusi pada set anonimitas bersama, dan protokol ini juga dapat mendukung NFT yang menjaga privasi.
  sparkswap: Spark Swap
  sparkswapp: Memungkinkan atomic swaps antara aset Spark dan/atau Firo, memastikan pertukaran yang tanpa kepercayaan dan pribadi.
  curvetrees: Curve Trees
  curvetreesp: Mengadopsi Curve Trees, sebuah teknik inovatif untuk bukti keanggotaan yang efisien yang mendukung set anonimitas global. Peningkatan ini akan secara substansial meningkatkan privasi, skalabilitas, kecepatan verifikasi, dan ukuran bukti.
  longtermgoals: Tujuan jangka panjang
  improvedinfra: Infrastruktur Dompet Ringan Penjaga Privasi yang Ditingkatkan
  improvedinfrap: Terus meneliti cara-cara untuk mengurangi ketergantungan pada server SPV khusus, memberikan pengguna opsi dompet ringan yang lebih pribadi dan terdesentralisasi.
  quantum: Spark Tahan-Kuantum
  quantump: Menjelajahi jalur untuk mentransisikan Spark menjadi protokol tahan-kuantum, serta potensi mitigasi sementara untuk melindungi dari ancaman kuantum di masa depan.
  tailemission: Mekanisme Konsensus Emisi Ekor (Tail Emission)
  tailemissionp: Model hibrida masternode–Proof-of-Work Firo saat ini mungkin berevolusi setelah emisi ekor tercapai. Kami sedang menyelidiki mekanisme insentif atau konsensus alternatif untuk mengamankan jaringan dalam jangka panjang.
  governance: Tata Kelola
  governancep: Mengembangkan struktur tata kelola yang jelas dan terdesentralisasi untuk mengurangi ketergantungan pada tim inti Firo. Tujuannya adalah untuk menyelaraskan semua pemangku kepentingan proyek tanpa hanya berfokus pada kepemilikan koin.
  integrations: Integrasi
  enkrypt: Integrasi Dompet Enkrypt
  enkryptp: Mengintegrasikan Firo ke dalam Enkrypt, dompet ekstensi browser Web3 multi-aset, dengan dukungan penuh untuk fitur Spark.
  layerswap: Integrasi Layerswap v8
  layerswapp: Memanfaatkan Layerswap v8, protokol peer-to-peer untuk menjembatani dan menukar aset kripto di berbagai blockchain yang berbeda. Dengan menggunakan pre-HTLC, ini mengatasi banyak keterbatasan atomic swap tradisional (misalnya, kedua belah pihak harus online) dan mendukung transaksi multi-hop.
  serai: Integrasi Serai
  seraip: Berkolaborasi dengan Serai, DEX lintas rantai yang berfokus pada likuiditas AMM untuk Bitcoin, Ethereum, DAI, dan Monero. Mengintegrasikan Firo memperluas opsi likuiditas lintas rantai dan basis penggunanya.
  iterative: Perbaikan Berulang
  campfire: Campfire
  campfirep: Terus membangun dompet desktop dan seluler Campfire untuk menyediakan dukungan fitur lengkap bagi masternode, Spark Assets, dan Spark Names.
  firodex: FiroDEX
  firodexp: Mengerjakan ulang FiroDEX agar lebih tangguh, memastikan infrastrukturnya—baik node maupun front end—dioperasikan oleh jaringan sukarelawan dan anggota komunitas yang terdesentralisasi.

roadmap-old:
  aura: Pemungutan Suara Pribadi Aura (finalisasi makalah)
  auradesc: Aura adalah mekanisme pemungutan suara pribadi kami untuk DAO yang terinspirasi oleh teknologi Lelantus kami yang memungkinkan pemungutan suara anonim namun dapat diverifikasi yang juga menyembunyikan progres surat suara. Kami bermaksud menggunakan ini sebagai fondasi untuk bergerak menuju tata kelola terdesentralisasi yang formal.
  avalanche: Avalanche
  avalanchedesc: Avalanche adalah algoritma konsensus yang memungkinkan transaksi instan, keamanan yang ditingkatkan, dan peningkatan tanpa fork. Kami sedang mengeksplorasi konsensus Avalanche sebagai pengganti potensial untuk masternode kami.
  development: Pengembangan
  heading: Peta Jalan
  mnodes: Deterministic Masternodes (selesai)
  mnodesq: Long Lived Masternode Quorums (selesai)
  mtpstrip: MTP Strip (selesai)
  mtpstripdesc: MTP stripping mengurangi ukuran blockchain Firo dari 60GB menjadi 4GB dengan menghapus bukti MTP dari blok lama.
  rebrand: Rebrand (selesai)
  lelantus: Aktivasi Lelantus (selesai)
  lelantusdesc: Lelantus adalah protokol privasi generasi berikutnya kami yang menawarkan tingkat privasi praktis tertinggi tanpa penyiapan terpercaya dan hanya mengandalkan asumsi kriptografi yang kuat. Lelantus mendukung set anonimitas yang beberapa kali lipat lebih besar daripada sistem privasi lain yang tidak memiliki penyiapan terpercaya.
  chainlocks: Chainlocks (selesai)
  chainlocksdesc: Chainlocks memanfaatkan jaringan masternode Firo untuk melindungi dari serangan 51%. Transaksi mencapai finalitas segera setelah 1 blok dikonfirmasi.
  rap: Alamat RAP (selesai)
  rapdesc: Alamat RAP memungkinkan alamat yang dapat dibagikan secara publik tanpa membiarkan pihak ketiga melihat berapa banyak atau kapan alamat tersebut menerima dana.
  instant: Instant Send (selesai)
  instantdesc: Instant Send memanfaatkan jaringan masternode Firo untuk memungkinkan transaksi dikonfirmasi dalam beberapa detik, memungkinkan penggunaan praktis sebagai media pertukaran.
  elysium: Elysium (di Testnet)
  elysiumdesc: Elysium memungkinkan token (misalnya stablecoin, koin berbasis aset) diterbitkan di jaringan Firo yang akan mendapat manfaat dari teknologi privasi Firo.
  elysiumv2: Elysium v2
  elysiumv2desc: Elysium v2 memperluas kemampuan Elysium dengan penjembatanan yang lebih mudah dan kemampuan DeFi. Elysium v2 juga akan menerapkan Spats yang akan menyembunyikan jenis aset yang ditransfer.
  lelantusspark: Lelantus Spark (selesai)
  lelantussparkdesc: Lelantus Spark memungkinkan pembayaran anonim langsung yang memungkinkan pengguna bertransaksi satu sama lain tanpa mengungkapkan jumlah, sumber, dan penerima. Spark memperkenalkan alamat Spark yang akan memungkinkan pengguna menjaga dana mereka tetap tersembunyi sepenuhnya beserta dukungan view key penuh dan multisig ambang batas (threshold multisig).
  mobile: Dompet Seluler (selesai)
  mobiledesc: Dompet seluler asli yang pribadi secara default dan akan memiliki dukungan transaksi Lelantus penuh.
  firopow: FiroPoW (selesai)
  firopowdesc: FiroPoW adalah varian ProgPOW yang dirancang untuk GPU dan memiliki resistensi ASIC yang kuat.
  research: Riset
  lelantussparkaddress: Sub-addressing dan bukti pembayaran Lelantus Spark (selesai)
  lelantussparkaddressdesc: Lelantus Spark akan mendukung sub-alamat yang memungkinkan pemindaian lebih efisien dan bukti pembayaran yang memungkinkan pengguna membuktikan bahwa mereka telah melakukan pembayaran.
  firodex: FiroDEX (selesai)
  firodexdesc: FiroDEX memungkinkan pengguna untuk menukar ke dan dari Firo menggunakan infrastruktur terdesentralisasi dengan teknologi atomic swap.
  bridges: Jembatan lintas rantai (Cross-chain bridges)
  bridgesdesc: Jembatan lintas rantai akan memungkinkan token dari ekosistem lain untuk masuk dan keluar dari lapisan token Elysium Firo guna memanfaatkan infrastruktur privasi kami.
  mixnets: Mixnets
  mixnetsdesc: Penyaluran (tunnelling) transaksi dan komunikasi node ke dalam mixnets menawarkan peningkatan perlindungan metadata bahkan terhadap lawan tingkat negara. Kami sedang menyelidiki mixnet Meson yang dibangun di atas pustaka perangkat lunak Katzenpost.
  spats: Spark Assets (selesai)
  spatsdesc: Spark Assets memperluas fungsionalitas Spark untuk menyembunyikan jenis aset yang ditransfer. Spats direncanakan untuk diimplementasikan di Elysium v2.
  syncclients: Klien sinkronisasi cepat
  syncclientsdesc: Klien sinkronisasi cepat memungkinkan pengguna menyinkronkan dompet mereka dengan cepat tanpa perlu mengunduh seluruh blockchain sambil tetap mendukung transaksi Lelantus.
  learnmore: Pelajari lebih lanjut
  
